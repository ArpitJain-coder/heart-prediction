<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>CardioGuard AI | Heart Prediction</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["pandas", "numpy", "scikit-learn", "joblib"], 
          entrypoint: "main_app.py",
          files: {
            "main_app.py": {
              url: "main_app.py",
            },
            "banner.png": {
              url: "banner.png",
            },
            "scaler.pkl": {
              url: "scaler.pkl",
            },
            "columns.pkl": {
              url: "columns.pkl",
            },
            "knn_heart_model.pkl": {
              url: "knn_heart_model.pkl",
            },
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
